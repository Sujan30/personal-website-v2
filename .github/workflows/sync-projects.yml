name: Sync project READMEs

on:
  schedule:
    - cron: '0 12 * * *'   # daily noon UTC
  workflow_dispatch:
  repository_dispatch:
    types: [project-readme-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run sync script
        run: npx tsx scripts/sync-projects.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/projects.generated.json
          git diff --cached --quiet || git commit -m "chore: sync project readmes [skip ci]"
          git push
